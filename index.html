  <script>
    // Silence benign ResizeObserver loop notification (Chrome quirk).
    (function() {
      const RE = /ResizeObserver loop/;
      const _err = console.error;
      console.error = function(...args) {
        if (args.some(a => typeof a === 'string' && RE.test(a))) return;
        _err.apply(console, args);
      };
      const _warn = console.warn;
      console.warn = function(...args) {
        if (args.some(a => typeof a === 'string' && RE.test(a))) return;
        _warn.apply(console, args);
      };
      window.addEventListener('error', (e) => {
        if (e.message && RE.test(e.message)) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return true;
        }
      }, true);
      // Some Chrome versions report via reportError()
      if (typeof window.reportError === 'function') {
        const _rep = window.reportError;
        window.reportError = function(err) {
          if (err && typeof err.message === 'string' && RE.test(err.message)) return;
          if (typeof err === 'string' && RE.test(err)) return;
          return _rep.call(window, err);
        };
      }
      // Wrap ResizeObserver to swallow internal callback errors
      if (typeof window.ResizeObserver !== 'undefined') {
        const RO = window.ResizeObserver;
        window.ResizeObserver = class extends RO {
          constructor(cb) {
            super((entries, observer) => {
              window.requestAnimationFrame(() => {
                try { cb(entries, observer); } catch (e) {}
              });
            });
          }
        };
      }
    })();
  </script>
